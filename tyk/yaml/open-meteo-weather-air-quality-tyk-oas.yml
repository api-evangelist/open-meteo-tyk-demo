openapi: 3.0.3
info:
  title: Open-Meteo Weather & Air Quality
  version: 1.0.0
  description: 'A single API surface, fronted by Tyk, that proxies two free public Open-Meteo services: point weather forecasts
    (api.open-meteo.com) and air quality (air-quality-api.open-meteo.com). Both are keyless upstreams. Tyk adds CORS, response
    caching, rate limiting (to be a good citizen against the free upstream), and request validation. The rich operation descriptions
    below are what drive the generated MCP tools.'
servers:
- url: http://localhost:8080/env
  description: Local Tyk Gateway listen path
security: []
tags:
- name: Weather
  description: Point weather forecasts
- name: Air Quality
  description: Air quality and pollen forecasts
paths:
  /weather:
    get:
      operationId: getWeatherForecast
      tags:
      - Weather
      summary: Get a weather forecast for a coordinate
      description: Returns up to a 16-day weather forecast for a single latitude/longitude. Choose the variables you want
        with the `current`, `hourly`, and `daily` comma-separated lists. Proxies GET https://api.open-meteo.com/v1/forecast.
        No API key required.
      parameters:
      - name: latitude
        in: query
        required: true
        description: WGS84 latitude of the location, e.g. 40.7128 for New York City.
        schema:
          type: number
          format: float
          minimum: -90
          maximum: 90
        example: 40.7128
      - name: longitude
        in: query
        required: true
        description: WGS84 longitude of the location, e.g. -74.006 for New York City.
        schema:
          type: number
          format: float
          minimum: -180
          maximum: 180
        example: -74.006
      - name: current
        in: query
        required: false
        description: 'Comma-separated current-condition variables. Examples: temperature_2m, relative_humidity_2m, apparent_temperature,
          is_day, precipitation, weather_code, cloud_cover, wind_speed_10m, wind_direction_10m.'
        schema:
          type: string
        example: temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m
      - name: hourly
        in: query
        required: false
        description: 'Comma-separated hourly variables. Examples: temperature_2m, apparent_temperature, precipitation_probability,
          precipitation, weather_code, cloud_cover, wind_speed_10m, uv_index.'
        schema:
          type: string
        example: temperature_2m,precipitation_probability,weather_code
      - name: daily
        in: query
        required: false
        description: 'Comma-separated daily variables. Examples: weather_code, temperature_2m_max, temperature_2m_min, sunrise,
          sunset, precipitation_sum, wind_speed_10m_max.'
        schema:
          type: string
        example: weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum
      - name: forecast
        in: query
        required: false
        description: Number of forecast days. The gateway maps this to the upstream Open-Meteo `forecast_days` parameter.
        schema:
          type: integer
          minimum: 1
          maximum: 16
          default: 7
      - name: past_days
        in: query
        required: false
        description: Number of past days to include (0-92).
        schema:
          type: integer
          minimum: 0
          maximum: 92
          default: 0
      - name: temperature_unit
        in: query
        required: false
        schema:
          type: string
          enum:
          - celsius
          - fahrenheit
          default: celsius
      - name: wind_speed_unit
        in: query
        required: false
        schema:
          type: string
          enum:
          - kmh
          - ms
          - mph
          - kn
          default: kmh
      - name: precipitation_unit
        in: query
        required: false
        schema:
          type: string
          enum:
          - mm
          - inch
          default: mm
      - name: timezone
        in: query
        required: false
        description: IANA timezone, or `auto` to resolve from the coordinate.
        schema:
          type: string
          default: auto
        example: auto
      responses:
        '200':
          description: Forecast payload
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid parameters
  /air-quality:
    get:
      operationId: getAirQuality
      tags:
      - Air Quality
      summary: Get an air quality forecast for a coordinate
      description: Returns up to a 7-day air quality forecast (particulates, gases, pollen, and AQI values) for a single latitude/longitude,
        sourced from CAMS. Choose variables with the `current` and `hourly` comma-separated lists. Tyk rewrites this operation
        to GET https://air-quality-api.open-meteo.com/v1/air-quality. No API key required.
      parameters:
      - name: latitude
        in: query
        required: true
        description: WGS84 latitude of the location.
        schema:
          type: number
          format: float
          minimum: -90
          maximum: 90
        example: 40.7128
      - name: longitude
        in: query
        required: true
        description: WGS84 longitude of the location.
        schema:
          type: number
          format: float
          minimum: -180
          maximum: 180
        example: -74.006
      - name: current
        in: query
        required: false
        description: 'Comma-separated current air quality variables. Examples: european_aqi, us_aqi, pm10, pm2_5, carbon_monoxide,
          nitrogen_dioxide, sulphur_dioxide, ozone, dust, uv_index.'
        schema:
          type: string
        example: european_aqi,us_aqi,pm2_5,pm10,ozone
      - name: hourly
        in: query
        required: false
        description: 'Comma-separated hourly air quality variables. Examples: pm10, pm2_5, carbon_monoxide, nitrogen_dioxide,
          sulphur_dioxide, ozone, aerosol_optical_depth, dust, uv_index, ammonia, alder_pollen, birch_pollen, grass_pollen,
          ragweed_pollen, european_aqi, us_aqi.'
        schema:
          type: string
        example: pm2_5,pm10,ozone,nitrogen_dioxide,european_aqi
      - name: domains
        in: query
        required: false
        description: Model domain. `auto` picks the best available; CAMS Europe is higher resolution but Europe-only.
        schema:
          type: string
          enum:
          - auto
          - cams_europe
          - cams_global
          default: auto
      - name: forecast
        in: query
        required: false
        description: Number of forecast days. The gateway maps this to the upstream Open-Meteo `forecast_days` parameter.
        schema:
          type: integer
          minimum: 1
          maximum: 7
          default: 5
      - name: timezone
        in: query
        required: false
        description: IANA timezone, or `auto` to resolve from the coordinate.
        schema:
          type: string
          default: auto
        example: auto
      responses:
        '200':
          description: Air quality payload
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid parameters
components: {}
x-tyk-api-gateway:
  info:
    id: open-meteo-weather-air-quality
    name: Open-Meteo Weather & Air Quality
    state:
      active: true
      internal: false
  upstream:
    url: https://api.open-meteo.com/v1
  server:
    listenPath:
      value: /env/
      strip: true
    authentication:
      enabled: false
  middleware:
    global:
      cors:
        enabled: true
        allowedOrigins:
        - '*'
        allowedMethods:
        - GET
        - OPTIONS
        allowedHeaders:
        - Content-Type
        - Authorization
        exposedHeaders: []
        allowCredentials: false
        maxAge: 3600
        optionsPassthrough: false
        debug: false
      cache:
        enabled: true
        timeout: 300
        cacheAllSafeRequests: true
        cacheResponseCodes:
        - 200
        enableUpstreamCacheControl: false
      contextVariables:
        enabled: true
    operations:
      getWeatherForecast:
        validateRequest:
          enabled: true
          errorResponseCode: 422
        rateLimit:
          enabled: true
          rate: 60
          per: 60
        urlRewrite:
          enabled: true
          pattern: /weather
          rewriteTo: https://api.open-meteo.com/v1/forecast?forecast_days=$tyk_context.request_data.forecast
      getAirQuality:
        urlRewrite:
          enabled: true
          pattern: /air-quality
          rewriteTo: https://air-quality-api.open-meteo.com/v1/air-quality?forecast_days=$tyk_context.request_data.forecast
        validateRequest:
          enabled: true
          errorResponseCode: 422
        rateLimit:
          enabled: true
          rate: 60
          per: 60
